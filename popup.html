<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ytf-popup">
    <h1 class="ytf-header">YouTube Feed Filter</h1>

    <div class="ytf-health-status ytf-health-unknown" id="health-status">
      <span class="ytf-health-dot" id="health-dot">·</span>
      <span class="ytf-health-text" id="health-text">No data yet</span>
    </div>

    <section class="ytf-section">
      <h2 class="ytf-section-title">Filters</h2>

      <label class="ytf-row">
        <span class="ytf-label">Hide livestreams</span>
        <input type="checkbox" id="hideLivestreams" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide low-view videos</span>
        <div class="ytf-row-right">
          <input type="number" id="viewThreshold" class="ytf-number" min="0" step="1000" value="50000">
          <input type="checkbox" id="hideLowViews" class="ytf-toggle">
        </div>
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide Shorts</span>
        <input type="checkbox" id="hideShorts" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide Mixes</span>
        <input type="checkbox" id="hideMixes" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide Playables</span>
        <input type="checkbox" id="hidePlayables" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide members-only videos</span>
        <input type="checkbox" id="hideMembersOnly" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide Explore Topics</span>
        <input type="checkbox" id="hideExploreTopics" class="ytf-toggle">
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide topic chips bar</span>
        <input type="checkbox" id="hideTopicChips" class="ytf-toggle">
      </label>
    </section>

    <section class="ytf-section">
      <h2 class="ytf-section-title">Duration</h2>

      <label class="ytf-row">
        <span class="ytf-label">Hide videos under</span>
        <div class="ytf-row-right">
          <input type="number" id="minDurationMinutes" class="ytf-number" min="1" max="1440" step="1" value="10">
          <span class="ytf-unit">min</span>
          <input type="checkbox" id="hideShortDuration" class="ytf-toggle">
        </div>
      </label>

      <label class="ytf-row">
        <span class="ytf-label">Hide videos over</span>
        <div class="ytf-row-right">
          <input type="number" id="maxDurationMinutes" class="ytf-number" min="1" max="1440" step="1" value="60">
          <span class="ytf-unit">min</span>
          <input type="checkbox" id="hideLongDuration" class="ytf-toggle">
        </div>
      </label>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
